<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicon for various platforms -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="description" content="Website description - customize in siteConfig" />
    <meta name="keywords" content="website, keywords, customize" />
    <meta name="author" content="Site Name" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://example.com" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Site Name" />
    <meta property="og:description" content="Website description - customize in siteConfig" />
    <meta property="og:image" content="https://example.com/images/logo.jpg" />
    <meta property="og:url" content="https://example.com" />
    <meta property="og:site_name" content="Site Name" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Site Name" />
    <meta name="twitter:description" content="Website description - customize in siteConfig" />
    <meta name="twitter:image" content="https://example.com/images/logo.jpg" />
    
    <title>Site Name</title>
    
    <!-- Special Elite Font (Typewriter style) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    
    <!-- Structured Data (JSON-LD) for SEO -->
    <!-- Update this with your actual information -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Site Name",
      "url": "https://example.com",
      "description": "Website description - customize in siteConfig"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
